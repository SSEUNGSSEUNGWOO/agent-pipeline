scraper:
  # GitHub Trending 페이지 URL (기본값: 전체 언어)
  base_url: "https://github.com/trending"
  # 수집할 기간: daily | weekly | monthly
  period: "daily"
  # 수집할 언어 목록 (빈 문자열 = 전체 언어)
  languages:
    - ""
    - "python"
    - "javascript"
    - "typescript"
  # HTTP 요청 타임아웃 (초)
  timeout: 30
  # 요청 간 딜레이 (초)
  delay_between_requests: 2
  # 최대 재시도 횟수
  max_retries: 3
  # 재시도 간 대기 시간 (초)
  retry_delay: 5
  # 언어별 상위 몇 개 레포 수집
  top_n: 25
  # User-Agent 헤더
  user_agent: "Mozilla/5.0 (compatible; GitHub-Trending-Analyzer/1.0)"

analyzer:
  # Claude API 모델명
  model: "claude-opus-4-5"
  # 분석 시 최대 토큰 수
  max_tokens: 2000
  # 분석 대상 레포 수 (상위 N개)
  top_repos_for_analysis: 10
  # 최대 재시도 횟수
  max_retries: 3
  # 재시도 간 대기 시간 (초)
  retry_delay: 10
  # 분석 프롬프트 언어: ko | en
  prompt_language: "ko"

storage:
  # 데이터 저장 디렉토리
  data_dir: "data"
  # JSON 들여쓰기
  json_indent: 2
  # 날짜별 파일명 형식
  date_format: "%Y-%m-%d"

output:
  # 출력 디렉토리
  output_dir: "output"
  # 출력 파일 형식: md | json | csv (쉼표로 여러 개 가능)
  formats:
    - "md"
    - "json"
    - "csv"
  # 마크다운 보고서 제목
  report_title: "GitHub 트렌딩 분석 보고서"
  # 날짜별 파일명 형식
  date_format: "%Y-%m-%d"

logging:
  # 로그 디렉토리
  log_dir: "logs"
  # 로그 레벨: DEBUG | INFO | WARNING | ERROR | CRITICAL
  level: "INFO"
  # 로그 파일명 형식
  filename_format: "trending_%Y-%m-%d.log"
  # 콘솔 출력 여부
  console_output: true
